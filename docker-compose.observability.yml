services:
  api:
    environment:
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: fastapi-template
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:2.6.1
    volumes:
      - ./observability/tempo.yml:/etc/tempo/config.yaml:ro
    command: ["-config.file=/etc/tempo/config.yaml"]

  loki:
    image: grafana/loki:3.3.2
    user: "0"
    volumes:
      - ./observability/loki.yml:/etc/loki/config.yaml:ro
      - loki-data:/var/loki
    command: ["-config.file=/etc/loki/config.yaml"]

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - tempo
      - loki
      - prometheus

volumes:
  loki-data:
