[run]
source = app
omit =
    app/migrations/*
    app/main.py
    app/routers.py
    app/middleware/*
    app/*/routers.py
    app/*/*/routers.py
    app/*/filters.py
    app/*/*/filters.py

[report]
fail_under = 70
show_missing = true
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.
