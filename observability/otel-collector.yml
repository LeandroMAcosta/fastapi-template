receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Truncate log bodies larger than 4KB to prevent cost spikes
  transform/truncate_logs:
    log_statements:
      - context: log
        statements:
          - truncate_all(attributes, 256)
          - truncate_all(resource.attributes, 256)
          - limit(attributes, 10)

  # Drop noisy or unwanted logs
  filter/logs:
    logs:
      exclude:
        match_type: regexp
        bodies:
          - ".*healthcheck.*"

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo]
    logs:
      receivers: [otlp]
      processors: [filter/logs, transform/truncate_logs, batch]
      exporters: [loki]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
