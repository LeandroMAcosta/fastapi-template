auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /var/loki
  storage:
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  max_line_size: 8192               # reject lines > 8KB
  ingestion_rate_mb: 4              # max 4MB/s ingestion
  ingestion_burst_size_mb: 6
  per_stream_rate_limit: 3MB        # max 3MB/s per label stream
