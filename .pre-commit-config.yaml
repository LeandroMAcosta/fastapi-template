repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: uv run pytest tests/unit -x -q
        language: system
        pass_filenames: false
        always_run: true
